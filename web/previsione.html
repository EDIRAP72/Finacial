<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Previsione futura</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; padding:20px; }
    a { color:#64b5f6; text-decoration:none; }
    .box { background:#1e1e1e; padding:15px; border-radius:6px; margin-top:20px; }
    canvas { width:100%; height:300px; margin-top:20px; }
  </style>
</head>
<body>

<a href="/Finacial/web/titolo.html?ticker=" id="back">← Torna al titolo</a>

<h1 id="titolo"></h1>
<p id="descrizione"></p>

<div class="box">
  <h3>Previsione del prezzo</h3>
  <p id="testoPrevisione">Calcolo in corso…</p>
</div>

<canvas id="grafico"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const params = new URLSearchParams(window.location.search);
  const ticker = params.get('ticker') || '';

  document.getElementById('titolo').innerText = "Previsione futura: " + ticker;
  document.getElementById('back').href = "/Finacial/web/titolo.html?ticker=" + ticker;

  // Database opzioni (esempio)
  const opzioni = {
    'AAPL': { vol: 0.22, prezzo: 182 },
    'MSFT': { vol: 0.18, prezzo: 415 },
    'NVDA': { vol: 0.35, prezzo: 905 },
    'AMZN': { vol: 0.25, prezzo: 178 },
    'CVX': { vol: 0.14, prezzo: 152 }
  };

  const dati = opzioni[ticker];

  if (!dati) {
    document.getElementById('descrizione').innerText = "Questo titolo non ha opzioni disponibili.";
    document.getElementById('testoPrevisione').innerText = "Nessuna previsione disponibile.";
  } else {
    const prezzo = dati.prezzo;
    const vol = dati.vol;

    const base = prezzo * (1 + vol * 0.10);
    const up = prezzo * (1 + vol * 0.25);
    const down = prezzo * (1 - vol * 0.20);

    document.getElementById('testoPrevisione').innerHTML = `
      Prezzo attuale: <b>${prezzo}</b><br>
      Scenario base: <b>${base.toFixed(2)}</b><br>
      Scenario ottimistico: <b>${up.toFixed(2)}</b><br>
      Scenario pessimistico: <b>${down.toFixed(2)}</b>
    `;

    const ctx = document.getElementById('grafico').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Oggi', 'Futuro'],
        datasets: [
          { label: 'Pessimistico', data: [prezzo, down], borderColor: '#e53935' },
          { label: 'Base', data: [prezzo, base], borderColor: '#64b5f6' },
          { label: 'Ottimistico', data: [prezzo, up], borderColor: '#43a047' }
        ]
      },
      options: { responsive: true }
    });
  }
</script>

</body>
</html>
