<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Money Flow Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #111; color: #eee; }
    h1 { margin-top: 0; }
    .section-title { margin-top: 30px; margin-bottom: 10px; font-size: 20px; }
    #heatmap {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .tile {
      padding: 14px 8px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.3;
    }
    .ticker { font-weight: bold; display: block; }
    .name { font-size: 11px; opacity: 0.8; }
    .flow { font-size: 11px; margin-top: 4px; }
    .search-box { margin-top: 25px; }
    .search-box input {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #000;
      color: #eee;
    }
    .result {
      padding: 8px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      font-size: 13px;
    }
    .result span { display: block; }
    .result-ticker { font-weight: bold; }
    .result-name { font-size: 11px; opacity: 0.8; }
  </style>
</head>
<body>

<h1>Money Flow & Demand/Offer</h1>
<p>Top 20 titoli per flussi e pressione domanda/offerta.</p>

<div class="section-title">Heatmap Top 20</div>
<div id="heatmap"></div>

<div class="section-title">Cerca un titolo</div>
<div class="search-box">
  <input id="searchInput" type="text" placeholder="Cerca un titolo (AAPL, SPY, GLD, CVX, ETC...)" autocomplete="off">
  <div id="searchResults"></div>
</div>

<script>
  // Dataset statico (puoi cambiarlo quando vuoi)
  const universe = [
    { ticker: 'AAPL', name: 'Apple Inc.', flow: +8, demand: +7 },
    { ticker: 'MSFT', name: 'Microsoft Corp.', flow: +7, demand: +6 },
    { ticker: 'NVDA', name: 'NVIDIA Corp.', flow: +9, demand: +8 },
    { ticker: 'AMZN', name: 'Amazon.com Inc.', flow: +6, demand: +5 },
    { ticker: 'GOOGL', name: 'Alphabet Class A', flow: +5, demand: +4 },
    { ticker: 'META', name: 'Meta Platforms', flow: +4, demand: +3 },
    { ticker: 'TSLA', name: 'Tesla Inc.', flow: -6, demand: -7 },
    { ticker: 'SPY', name: 'S&P 500 ETF', flow: +3, demand: +2 },
    { ticker: 'QQQ', name: 'Nasdaq 100 ETF', flow: +4, demand: +3 },
    { ticker: 'XLE', name: 'Energy Select ETF', flow: +5, demand: +4 },
    { ticker: 'CVX', name: 'Chevron Corp.', flow: +7, demand: +6 },
    { ticker: 'XOM', name: 'Exxon Mobil', flow: +6, demand: +5 },
    { ticker: 'GLD', name: 'Gold Trust', flow: +2, demand: +3 },
    { ticker: 'SLV', name: 'Silver Trust', flow: +1, demand: +2 },
    { ticker: 'TLT', name: '20+Y Treasury', flow: -3, demand: -2 },
    { ticker: 'HYG', name: 'High Yield Corp', flow: -2, demand: -1 },
    { ticker: 'LQD', name: 'Inv Grade Corp', flow: +1, demand: +1 },
    { ticker: 'IWM', name: 'Russell 2000 ETF', flow: -4, demand: -3 },
    { ticker: 'EEM', name: 'Emerging Markets', flow: -1, demand: 0 },
    { ticker: 'USO', name: 'US Oil Fund', flow: +5, demand: +5 }
  ];

  function colorForFlow(flow) {
    if (flow >= 7) return '#1b5e20';
    if (flow >= 4) return '#2e7d32';
    if (flow >= 1) return '#558b2f';
    if (flow === 0) return '#616161';
    if (flow <= -7) return '#b71c1c';
    if (flow <= -4) return '#c62828';
    return '#e53935';
  }

  function renderHeatmap() {
    const container = document.getElementById('heatmap');
    container.innerHTML = '';
    universe.forEach(item => {
      const div = document.createElement('div');
      div.className = 'tile';
      div.style.background = colorForFlow(item.flow);
      div.onclick = () => vai(item.ticker);
      div.innerHTML = `
        <span class="ticker">${item.ticker}</span>
        <span class="name">${item.name}</span>
        <span class="flow">Flow: ${item.flow} | Domanda: ${item.demand}</span>
      `;
      container.appendChild(div);
    });
  }

  function vai(ticker) {
    window.location.href = '/Finacial/web/titolo.html?ticker=' + encodeURIComponent(ticker);
  }

  function mostraRisultati(query) {
    const box = document.getElementById('searchResults');
    const q = query.trim().toUpperCase();
    if (!q || q.length < 1) {
      box.innerHTML = '';
      return;
    }
    const results = universe.filter(item =>
      item.ticker.includes(q) || item.name.toUpperCase().includes(q)
    );
    if (results.length === 0) {
      box.innerHTML = '<div class="result">Nessun risultato</div>';
      return;
    }
    box.innerHTML = results.map(item => `
      <div class="result" onclick="vai('${item.ticker}')">
        <span class="result-ticker">${item.ticker}</span>
        <span class="result-name">${item.name}</span>
      </div>
    `).join('');
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderHeatmap();
    const input = document.getElementById('searchInput');
    input.addEventListener('input', e => mostraRisultati(e.target.value));
  });
</script>

</body>
</html>
