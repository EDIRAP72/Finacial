<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Financial Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Collegheremo style.css dopo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BARRA IN ALTO -->
    <header class="top-bar">
        <div class="logo">Financial Dashboard</div>
        <nav class="nav">
            <button type="button" onclick="showPage('home-page')">Home</button>
            <button type="button" onclick="showPage('title-page')">Titolo</button>
        </nav>
    </header>

    <!-- CONTENUTO PRINCIPALE -->
    <main class="main">

        <!-- PAGINA HOME -->
        <section id="home-page" class="page active">
            <h1 class="page-title">Mercati Globali</h1>

            <div class="box">
                <h2>Top 10 Azioni</h2>
                <div id="list-azioni" class="mini-list"></div>
            </div>

            <div class="box">
                <h2>Top 10 CFD</h2>
                <div id="list-cfd" class="mini-list"></div>
            </div>

            <div class="box">
                <h2>Top 10 Commodity</h2>
                <div id="list-commodity" class="mini-list"></div>
            </div>

            <div class="box">
                <h2>Top 10 ETC WisdomTree</h2>
                <div id="list-etc" class="mini-list"></div>
            </div>

            <div class="box">
                <h2>Top 10 ETF Obbligazionari</h2>
                <div id="list-bond" class="mini-list"></div>
            </div>
        </section>

        <!-- PAGINA TITOLO -->
        <section id="title-page" class="page">
            <h1 class="page-title" id="title-name">Titolo</h1>

            <div class="box">
                <h2>Grafico principale</h2>
                <div id="main-chart-container" class="main-chart-wrapper"></div>
            </div>

            <div class="box">
                <button type="button" class="back-btn" onclick="showPage('home-page')">
                    ← Torna alla Home
                </button>
            </div>
        </section>

    </main>

    <!-- Collegheremo la logica dopo -->
    <script src="app.js"></script>
</body>
</html>
